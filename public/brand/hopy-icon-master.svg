<!-- /public/brand/hopy-icon-master.svg -->
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">HOPY Icon Master v1</title>
  <desc id="desc">
    Center confusion point, four outer state points, and an upward compass needle moving toward decision.
  </desc>

  <!-- background safe field -->
  <rect x="0" y="0" width="1024" height="1024" rx="240" fill="#FFFFFF" />

  <!-- quiet outer field -->
  <circle
    cx="512"
    cy="512"
    r="356"
    stroke="#94A3B8"
    stroke-width="28"
    fill="none"
  />

  <!-- secondary ring -->
  <circle
    cx="512"
    cy="512"
    r="292"
    stroke="#CBD5E1"
    stroke-width="14"
    fill="none"
  />

  <!-- directional guide lines -->
  <line
    x1="512"
    y1="156"
    x2="512"
    y2="868"
    stroke="#CBD5E1"
    stroke-width="10"
    stroke-linecap="round"
  />
  <line
    x1="156"
    y1="512"
    x2="868"
    y2="512"
    stroke="#CBD5E1"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- soft center halo for calm presence -->
  <circle cx="512" cy="512" r="78" fill="#FFFFFF" fill-opacity="0.94" />

  <!-- state circles -->
  <!-- north = decision -->
  <circle cx="512" cy="182" r="48" fill="#F59E0B" />

  <!-- east = exploration -->
  <circle cx="842" cy="512" r="42" fill="#3B82F6" />

  <!-- south = organization -->
  <circle cx="512" cy="842" r="42" fill="#14B8A6" />

  <!-- west = convergence -->
  <circle cx="182" cy="512" r="42" fill="#8B5CF6" />

  <!-- center = confusion -->
  <circle cx="512" cy="512" r="38" fill="#6B7280" />

  <!-- upper red tip only / points clearly toward north decision -->
  <path
    d="M512 248
       L552 370
       L512 344
       L472 370
       Z"
    fill="#EF4444"
  />

  <!-- north emphasis ring -->
  <circle
    cx="512"
    cy="182"
    r="68"
    stroke="#F59E0B"
    stroke-opacity="0.36"
    stroke-width="12"
    fill="none"
  />
</svg>

<!--
このファイルの正式役割
HOPYアイコンの親ソースとして使う元SVG。
favicon・PWA用PNG・apple-touch-icon へ展開する前提の唯一の正の元データ。
-->

<!--
【今回このファイルで修正したこと】
1. 外周リングを大きくし、HOPYの骨格が小サイズでも残るようにしました。
2. 北・東・南・西・中心の状態点を大きくし、5状態が見えやすい比率にしました。
3. 針先だけを上方向へ強く伸ばし、北の「決定」をしっかり指す形に修正しました。
4. 意味・色・5点構造は変えず、比率だけを調整しました。
-->
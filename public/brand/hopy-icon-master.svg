<!-- /public/brand/hopy-icon-master.svg -->
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">HOPY Icon Master v1</title>
  <desc id="desc">
    Center confusion point, four outer state points, and an upward compass needle moving toward decision.
  </desc>

  <!-- background safe field -->
  <rect x="0" y="0" width="1024" height="1024" rx="240" fill="#F8FAFC" />

  <!-- quiet outer field -->
  <circle
    cx="512"
    cy="512"
    r="318"
    stroke="#CBD5E1"
    stroke-width="20"
    fill="none"
  />

  <!-- secondary ring -->
  <circle
    cx="512"
    cy="512"
    r="258"
    stroke="#E2E8F0"
    stroke-width="10"
    fill="none"
  />

  <!-- directional guide lines -->
  <line
    x1="512"
    y1="248"
    x2="512"
    y2="776"
    stroke="#E2E8F0"
    stroke-width="8"
    stroke-linecap="round"
  />
  <line
    x1="248"
    y1="512"
    x2="776"
    y2="512"
    stroke="#E2E8F0"
    stroke-width="8"
    stroke-linecap="round"
  />

  <!-- soft center halo for calm presence -->
  <circle cx="512" cy="512" r="64" fill="#F8FAFC" fill-opacity="0.86" />

  <!-- state circles -->
  <!-- north = decision -->
  <circle cx="512" cy="214" r="40" fill="#F59E0B" />

  <!-- east = exploration -->
  <circle cx="810" cy="512" r="34" fill="#3B82F6" />

  <!-- south = organization -->
  <circle cx="512" cy="810" r="34" fill="#14B8A6" />

  <!-- west = convergence -->
  <circle cx="214" cy="512" r="34" fill="#8B5CF6" />

  <!-- center = confusion -->
  <circle cx="512" cy="512" r="30" fill="#6B7280" />

  <!-- upward needle -->
  <g>
    <!-- body -->
    <path
      d="M512 334
         C519 396 523 452 523 512
         C523 572 519 628 512 690
         C505 628 501 572 501 512
         C501 452 505 396 512 334Z"
      fill="#94A3B8"
    />
    <!-- upper red tip -->
    <path
      d="M512 278
         L538 344
         L512 332
         L486 344
         Z"
      fill="#EF4444"
    />
  </g>

  <!-- tiny north emphasis ring -->
  <circle
    cx="512"
    cy="214"
    r="56"
    stroke="#F59E0B"
    stroke-opacity="0.16"
    stroke-width="8"
    fill="none"
  />
</svg>

<!--
このファイルの正式役割
HOPYアイコンの親ソースとして使う元SVG。
favicon・PWA用PNG・apple-touch-icon へ展開する前提の唯一の正の元データ。
-->

<!--
【今回このファイルで修正したこと】
1. 下側に追加してしまった針先形状を削除しました。
2. 針は1枚目と同じく、上側だけ赤い先端がある構成に戻しました。
3. リング・状態点・配置・色の他要素には触れていません。
*/
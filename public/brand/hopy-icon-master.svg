<!-- /public/brand/hopy-icon-master.svg -->
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">HOPY Icon Master v1</title>
  <desc id="desc">
    Center confusion point, four outer state points, and an upward compass needle moving toward decision.
  </desc>

  <!-- background safe field -->
  <rect x="0" y="0" width="1024" height="1024" rx="240" fill="#FFFFFF" />

  <!-- quiet outer field -->
  <circle
    cx="512"
    cy="512"
    r="318"
    stroke="#94A3B8"
    stroke-width="24"
    fill="none"
  />

  <!-- secondary ring -->
  <circle
    cx="512"
    cy="512"
    r="258"
    stroke="#CBD5E1"
    stroke-width="12"
    fill="none"
  />

  <!-- directional guide lines -->
  <line
    x1="512"
    y1="248"
    x2="512"
    y2="776"
    stroke="#CBD5E1"
    stroke-width="10"
    stroke-linecap="round"
  />
  <line
    x1="248"
    y1="512"
    x2="776"
    y2="512"
    stroke="#CBD5E1"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- soft center halo for calm presence -->
  <circle cx="512" cy="512" r="64" fill="#FFFFFF" fill-opacity="0.94" />

  <!-- state circles -->
  <!-- north = decision -->
  <circle cx="512" cy="214" r="40" fill="#F59E0B" />

  <!-- east = exploration -->
  <circle cx="810" cy="512" r="34" fill="#3B82F6" />

  <!-- south = organization -->
  <circle cx="512" cy="810" r="34" fill="#14B8A6" />

  <!-- west = convergence -->
  <circle cx="214" cy="512" r="34" fill="#8B5CF6" />

  <!-- center = confusion -->
  <circle cx="512" cy="512" r="30" fill="#6B7280" />

  <!-- upper red tip only -->
  <path
    d="M512 266
       L542 352
       L512 336
       L482 352
       Z"
    fill="#EF4444"
  />

  <!-- tiny north emphasis ring -->
  <circle
    cx="512"
    cy="214"
    r="56"
    stroke="#F59E0B"
    stroke-opacity="0.28"
    stroke-width="10"
    fill="none"
  />
</svg>

<!--
このファイルの正式役割
HOPYアイコンの親ソースとして使う元SVG。
favicon・PWA用PNG・apple-touch-icon へ展開する前提の唯一の正の元データ。
-->

<!--
【今回このファイルで修正したこと】
1. 背景面を #F8FAFC から #FFFFFF に変更しました。
2. 外周リング・内周リング・ガイド線を少し濃くし、線幅も少し上げました。
3. 北の強調リングの不透明度と線幅を少し上げました。
4. 状態点の意味・配置・針先構造は変えていません。
-->